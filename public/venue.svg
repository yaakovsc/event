  <rect x="1062" y="220" width="88" height="220" fill="rgba(180,165,140,0.12)" stroke="#9A8A78" stroke-width="2.5"/>
  <rect x="1072" y="232" width="68" height="18" fill="rgba(160,140,110,0.18)" stroke="#B0A090" stroke-width="1"/>
  <rect x="1072" y="256" width="68" height="18" fill="rgba(160,140,110,0.18)" stroke="#B0A090" stroke-width="1"/>
  <rect x="1072" y="280" width="68" height="18" fill="rgba(160,140,110,0.18)" stroke="#B0A090" stroke-width="1"/>
