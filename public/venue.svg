  <rect x="470" y="698" width="260" height="52" fill="rgba(180,165,140,0.12)" stroke="#9A8A78" stroke-width="2.5"/>
  <rect x="482" y="707" width="52" height="34" fill="rgba(160,140,110,0.18)" stroke="#B0A090" stroke-width="1" rx="2"/>
  <rect x="542" y="707" width="36" height="34" fill="rgba(160,140,110,0.18)" stroke="#B0A090" stroke-width="1" rx="2"/>
  <rect x="586" y="707" width="36" height="34" fill="rgba(160,140,110,0.18)" stroke="#B0A090" stroke-width="1" rx="2"/>
