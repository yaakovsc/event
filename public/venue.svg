  <circle cx="96"  cy="243" r="7" fill="none" stroke="#B0A090" stroke-width="1"/>
  <circle cx="116" cy="243" r="7" fill="none" stroke="#B0A090" stroke-width="1"/>
  <circle cx="130" cy="243" r="7" fill="none" stroke="#B0A090" stroke-width="1"/>

