  <g fill="rgba(160,140,110,0.22)" stroke="#9A8A78" stroke-width="1.2">
    <rect x="194" y="198" width="16" height="16"/>
    <rect x="990" y="198" width="16" height="16"/>
    <rect x="194" y="576" width="16" height="16"/>
    <rect x="990" y="576" width="16" height="16"/>
    <rect x="380" y="198" width="13" height="13"/>
    <rect x="807" y="198" width="13" height="13"/>
    <rect x="380" y="576" width="13" height="13"/>
    <rect x="807" y="576" width="13" height="13"/>
