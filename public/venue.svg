  <rect x="56" y="56" width="1088" height="688" fill="none" stroke="#C8BEB2" stroke-width="1" rx="3"/>

  <!-- Stage / Chuppah — top wall, shallow -->
  <rect x="400" y="50" width="400" height="90" fill="rgba(180,165,140,0.12)" stroke="#9A8A78" stroke-width="2.5"/>
  <rect x="414" y="60" width="372" height="68" fill="none" stroke="#B0A090" stroke-width="1.2"/>
  <rect x="426" y="120" width="348" height="6" fill="none" stroke="#B0A090" stroke-width="1"/>
  <circle cx="432" cy="80"  r="6" fill="rgba(160,140,110,0.3)" stroke="#9A8A78" stroke-width="1.2"/>
  <circle cx="768" cy="80"  r="6" fill="rgba(160,140,110,0.3)" stroke="#9A8A78" stroke-width="1.2"/>
  <circle cx="432" cy="116" r="6" fill="rgba(160,140,110,0.3)" stroke="#9A8A78" stroke-width="1.2"/>
  <circle cx="768" cy="116" r="6" fill="rgba(160,140,110,0.3)" stroke="#9A8A78" stroke-width="1.2"/>
  <rect x="432" y="74" width="336" height="48" fill="none" stroke="rgba(180,155,110,0.4)" stroke-width="1" stroke-dasharray="6,3"/>

