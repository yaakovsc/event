  <path d="M900 740 Q900 706 866 740" fill="none" stroke="#B0A090" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- Restrooms — bottom corners -->
  <rect x="50"  y="640" width="100" height="110" fill="rgba(180,165,140,0.12)" stroke="#9A8A78" stroke-width="2.5"/>
  <line x1="100" y1="640" x2="100" y2="750" stroke="#B0A090" stroke-width="1"/>
  <path d="M56 648 Q56 682 90 682"  fill="none" stroke="#B0A090" stroke-width="1" stroke-dasharray="4,3"/>
  <path d="M104 648 Q104 682 144 682" fill="none" stroke="#B0A090" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="1050" y="640" width="100" height="110" fill="rgba(180,165,140,0.12)" stroke="#9A8A78" stroke-width="2.5"/>
  <line x1="1100" y1="640" x2="1100" y2="750" stroke="#B0A090" stroke-width="1"/>
  <path d="M1056 648 Q1056 682 1090 682" fill="none" stroke="#B0A090" stroke-width="1" stroke-dasharray="4,3"/>
  <path d="M1104 648 Q1104 682 1144 682" fill="none" stroke="#B0A090" stroke-width="1" stroke-dasharray="4,3"/>

